name: Generate Snake Animation

# Renders the contribution-graph "snake" into SVGs and publishes them to the
# `output` branch, which the README references via raw.githubusercontent.com.

on:
  schedule:
    # Refresh twice a day so the snake stays current.
    - cron: "0 */12 * * *"
  workflow_dispatch: # allow manual runs from the Actions tab
  push:
    branches:
      - main
      - master

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - name: Generate snake SVGs
        uses: Platane/snk@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          # Brand palette: snake in signal orange (#FF3B00) on a dark grid.
          outputs: |
            dist/github-snake.svg
            dist/github-snake-dark.svg?palette=github-dark&color_snake=#FF3B00

      - name: Publish to the output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
